# .devcontainer/docker-compose.yml
version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: avcs-dna-dev
    hostname: avcs-dna
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
      - avcs-data:/workspace/data
      - avcs-logs:/workspace/logs
      - avcs-models:/workspace/models
      - ~/.gitconfig:/home/vscode/.gitconfig:ro
      - ~/.ssh:/home/vscode/.ssh:ro
    environment:
      - PYTHONPATH=/workspace
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    ports:
      - "8501:8501"
    networks:
      - avcs-network
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE
    command: sleep infinity

  # Optional: PostgreSQL for data persistence
  postgres:
    image: postgres:15-alpine
    container_name: avcs-postgres
    environment:
      POSTGRES_DB: avcs
      POSTGRES_USER: avcs_user
      POSTGRES_PASSWORD: avcs_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - avcs-network
    restart: unless-stopped

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: avcs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - avcs-network
    restart: unless-stopped
    command: redis-server --appendonly yes

networks:
  avcs-network:
    driver: bridge

volumes:
  avcs-data:
  avcs-logs:
  avcs-models:
  postgres-data:
  redis-data:
